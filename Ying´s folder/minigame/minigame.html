<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Minigame Duck Hunt</title>

        <link rel="stylesheet" type="text/css" href="style.css" />
        <script type="module" src="minigame.js" defer></script>
        <script src="https://code.createjs.com/1.0.0/tweenjs.min.js"></script>
    </head>
    <body>
        <div id="canvas" class="">
            <canvas width="1570" height="680" id="duckcanvas" style="border: 1px solid black;">
            </canvas>
        </div>
        <img src="/images/background.png" id="duckhuntbackground" style="display:none;">
        
        <div id="duckhunting">

            <div class="scores">
              <p class="hits"><b>0</b> hit targets</p>
              <p class="attempts"><b>0</b> misses </p>
            </div>
            
        <div class="spriteWrapper">
        </div>

        <div class="actionPanel">
            <button>Start Game</button>
        </div>

    </body>
</html>
